<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Fertilizer & Calibration Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-8">

    <div class="max-w-4xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-xl font-bold mb-4 text-gray-800">Fertilizer Calculator</h2>
        
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1 text-gray-600">Total Treatment Area</label>
          <div class="flex gap-2">
            <input id="totalArea" type="number" value="5000" class="w-2/3 p-2 border rounded focus:ring-2 focus:ring-green-500 outline-none">
            <select id="areaUnit" class="w-1/3 p-2 border rounded bg-white text-sm">
              <option value="sqft">Sq. Ft.</option>
              <option value="acre">Acres</option>
            </select>
          </div>
        </div>
        
        <div class="mb-4 bg-gray-50 p-3 rounded border border-gray-200">
          <div class="grid grid-cols-2 gap-2 mb-2">
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase">Target Nutrient</label>
              <select id="targetNutrient" class="w-full p-2 border rounded bg-white text-sm mt-1">
                <option value="N">Nitrogen (N)</option>
                <option value="P">Phosphorus (P)</option>
                <option value="K">Potassium (K)</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 uppercase">Rate Unit Basis</label>
              <select id="rateUnit" class="w-full p-2 border rounded bg-white text-sm mt-1">
                <option value="per1000">per 1,000 Sq Ft</option>
                <option value="perAcre">per Acre</option>
              </select>
            </div>
          </div>
          <label class="block text-sm font-medium mb-1 text-gray-600">Target Application Rate</label>
          <input id="targetRate" type="number" step="0.1" value="1.0" class="w-full p-2 border rounded focus:ring-2 focus:ring-green-500 outline-none">
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium mb-1 text-gray-600">Fertilizer Bag Analysis (% Guaranteed)</label>
          <div class="grid grid-cols-3 gap-2">
            <div>
              <span class="text-xs text-center block text-gray-500 font-bold">N (%)</span>
              <input id="percentN" type="number" value="24" class="w-full p-2 border rounded text-center">
            </div>
            <div>
              <span class="text-xs text-center block text-gray-500 font-bold">P (%)</span>
              <input id="percentP" type="number" value="0" class="w-full p-2 border rounded text-center">
            </div>
            <div>
              <span class="text-xs text-center block text-gray-500 font-bold">K (%)</span>
              <input id="percentK" type="number" value="11" class="w-full p-2 border rounded text-center">
            </div>
          </div>
        </div>

        <div class="mb-4 border-t pt-4">
          <label class="block text-sm font-medium mb-1 text-gray-600">Spreader Swath Width (Feet)</label>
          <input id="swathWidth" type="number" value="10" step="0.5" class="w-full p-2 border rounded focus:ring-2 focus:ring-green-500 outline-none">
        </div>
        
        <button id="logAppBtn" class="w-full bg-green-600 text-white p-2 rounded font-bold hover:bg-green-700 transition">
          Log Application
        </button>
      </div>
    
      <div class="bg-white p-6 rounded-lg shadow-md flex flex-col justify-between">
        <div>
          <div class="mb-4">
            <h2 class="text-xs font-bold uppercase tracking-wider text-gray-400">Total Weight for Entire Area</h2>
            <div class="text-4xl font-black text-green-600"><span id="totalProductOut">0.0</span> lbs</div>
          </div>

          <div class="mb-6 border-t pt-4">
            <h2 class="text-xs font-bold uppercase tracking-wider text-gray-400">Product Application Rate</h2>
            <div class="text-2xl font-black text-blue-600"><span id="productPer1000Out">0.0</span> lbs / 1,000 sq ft</div>
          </div>

          <div class="bg-gray-50 border border-gray-200 p-4 rounded-lg text-xs font-mono text-gray-700 mb-6">
            <h4 class="font-bold uppercase text-gray-500 mb-2 border-b pb-1">Calculation Breakdown Process</h4>
            <div id="mathProcessLog" class="space-y-2">
              </div>
          </div>
        </div>
        
        <div class="border-t pt-4 flex-grow">
          <h3 class="text-sm font-bold mb-2 text-gray-800">Application History</h3>
          <ul id="historyList" class="divide-y divide-gray-200 max-h-32 overflow-y-auto">
              </ul>
        </div>
      </div>

    </div>

    <div id="calibrationWrapper" class="max-w-4xl mx-auto px-6"></div>

    <script src="app.js"></script>
</body>
</html>
